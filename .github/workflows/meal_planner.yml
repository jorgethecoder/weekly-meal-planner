name: Automated Weekly Meal Planner

on:
  schedule:
    # Run every Friday afternoon at 15:00 UTC (4:00 PM BST / 5:00 PM CEST)
    - cron: '0 15 * * 5'
  workflow_dispatch:
    # Allows manual triggering from the Actions tab in GitHub

permissions:
  contents: write # Required to push meal history back to the repository

jobs:
  run-planner:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        persist-credentials: true

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip' # cache pip dependencies to speed up runs

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Meal Planner
      env:
        RECIPE_API_KEY: ${{ secrets.RECIPE_API_KEY }}
        GMAIL_USER: ${{ secrets.GMAIL_USER }}
        GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
      run: |
        python main.py

    - name: Commit and Push Meal History
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        
        # Check if meal_history.json exists and has modifications
        if [ -f meal_history.json ]; then
          git add meal_history.json
          
          # Only commit and push if there are actual changes
          if ! git diff --cached --quiet; then
            git commit -m "chore: update meal history [skip ci]"
            git push
            echo "Successfully committed and pushed meal history updates."
          else
            echo "No changes detected in meal history."
          fi
        else
          echo "meal_history.json does not exist. Skipping push."
        fi
